name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      platform_url:
        description: '模型平台公网地址'
        required: false
        default: 'https://stubborn-baby.onrender.com'
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 设置 Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0 platform-tools'

      - name: 注入平台地址
        working-directory: android-app
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            PLATFORM_URL="${{ inputs.platform_url }}"
          else
            PLATFORM_URL="${{ vars.PLATFORM_URL || 'https://stubborn-baby.onrender.com' }}"
          fi
          echo "使用平台地址: $PLATFORM_URL"
          sed -i "s|http://192.168.124.14:5000|$PLATFORM_URL|g" app/src/main/java/com/stubbornbaby/app/MainActivity.java
          cat app/src/main/java/com/stubbornbaby/app/MainActivity.java | grep PLATFORM_URL

      - name: 构建 Debug APK
        working-directory: android-app
        run: ./gradlew assembleDebug

      - name: 构建 Release APK
        working-directory: android-app
        run: ./gradlew assembleRelease

      - name: 上传 Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: stubborn-baby-debug
          path: android-app/app/build/outputs/apk/debug/app-debug.apk

      - name: 上传 Release APK (未签名)
        uses: actions/upload-artifact@v4
        with:
          name: stubborn-baby-release-unsigned
          path: android-app/app/build/outputs/apk/release/app-release-unsigned.apk

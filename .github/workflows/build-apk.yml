name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platforms;android-34 build-tools;34.0.0 platform-tools"

      - name: Accept Android SDK Licenses
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Inject Platform URL
        working-directory: android-app
        run: |
          PLATFORM_URL="https://stubborn-baby.onrender.com"
          echo "Platform URL: $PLATFORM_URL"
          sed -i "s|http://192.168.124.14:5000|$PLATFORM_URL|g" app/src/main/java/com/stubbornbaby/app/MainActivity.java
          grep PLATFORM_URL app/src/main/java/com/stubbornbaby/app/MainActivity.java

      - name: Build Debug APK
        working-directory: android-app
        run: ./gradlew assembleDebug

      - name: Build Release APK
        working-directory: android-app
        run: ./gradlew assembleRelease

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: stubborn-baby-debug
          path: android-app/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: stubborn-baby-release-unsigned
          path: android-app/app/build/outputs/apk/release/app-release-unsigned.apk
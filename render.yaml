services:
  - type: web
    name: stubborn-baby
    env: python
    region: singapore
    rootDir: model-platform
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: PORT
        value: "10000"
